[project]
name = "agentaid"
version = "0.0.0"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.8",
    "anthropic>=0.40",
    "opentelemetry-api>=1.27",
    "opentelemetry-sdk>=1.27",
    "httpx>=0.27",
    "numpy>=2.0",
    "scipy>=1.14",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentaid"]
