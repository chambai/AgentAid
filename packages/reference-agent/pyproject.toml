[project]
name = "arxiv-agent"
version = "0.0.0"
requires-python = ">=3.12"
dependencies = [
    "agentaid",
    "pydantic-ai>=0.0.13",
    "anthropic>=0.40",
    "httpx>=0.27",
    "feedparser>=6.0",
]

[tool.uv.sources]
agentaid = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/arxiv_agent"]

[tool.hatch.build.targets.wheel.force-include]
"src/arxiv_agent/mock_arxiv/data" = "arxiv_agent/mock_arxiv/data"

[tool.pytest.ini_options]
asyncio_mode = "auto"
markers = [
    "live: tests that hit real LLM/external APIs (excluded by default in CI)",
]
