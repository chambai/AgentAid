name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.x"
      - name: Sync workspace
        run: uv sync --all-packages
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Type-check (mypy)
        run: |
          uv run mypy \
            packages/agentaid-py/src \
            packages/agentaid-server/src \
            apps/reference-agent/src \
            || echo "::warning::mypy errors — non-blocking for portfolio scope"
      - name: Tests
        run: uv run pytest -m "not live" --maxfail=5

  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Install
        run: pnpm install
      - name: Type-check
        run: pnpm -r typecheck
      - name: Tests
        run: pnpm -r test
      - name: Build
        run: pnpm -r build
